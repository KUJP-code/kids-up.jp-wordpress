name: Deploy WordPress Theme

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Prepare SSH files
        shell: bash
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/deploy_key"
          KNOWN_HOSTS_PATH="$RUNNER_TEMP/known_hosts"

          printf '%s' "${{ secrets.WORDPRESS_SSH_KEY }}" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          ssh-keyscan -H "${{ secrets.EC2_HOST }}" > "$KNOWN_HOSTS_PATH"
          chmod 644 "$KNOWN_HOSTS_PATH"

      - name: Preview sync
        shell: bash
        run: |
          set -euo pipefail
          rsync -avzn \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="node_modules/" \
            --exclude=".DS_Store" \
            -e "ssh -i $RUNNER_TEMP/deploy_key -o UserKnownHostsFile=$RUNNER_TEMP/known_hosts" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.THEME_PATH }}/"

      - name: Deploy theme
        shell: bash
        run: |
          set -euo pipefail
          rsync -avz \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude="node_modules/" \
            --exclude=".DS_Store" \
            -e "ssh -i $RUNNER_TEMP/deploy_key -o UserKnownHostsFile=$RUNNER_TEMP/known_hosts" \
            ./ "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.THEME_PATH }}/"